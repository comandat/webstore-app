<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Comandat.ro - Homepage</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <style type="text/tailwindcss">
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FAF9F6;
        }
        :root {
            --green-custom: #16a34a;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* ====== LIQUID GLASS - TEMA DE BAZĂ (DESCHISĂ) ====== */
        .liquid-glass {
            background: rgba(255, 255, 255, 0.15);
            -webkit-backdrop-filter: blur(16px) saturate(1.2);
            backdrop-filter: blur(16px) saturate(1.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 
                inset 0 1.5px 2px rgba(255, 255, 255, 0.8),
                inset 0 -1.5px 2px rgba(255, 255, 255, 0.3),
                0 8px 32px rgba(0, 0, 0, 0.12);
            
            /* Adăugăm tranziții lente și fine pentru schimbarea culorilor */
            transition: background 0.4s ease, box-shadow 0.4s ease, border-color 0.4s ease;
        }

        /* Setăm o tranziție și pe iconițe ca să se schimbe lent din gri în alb */
        .liquid-glass a, .liquid-glass span {
            transition: color 0.4s ease;
        }

        @supports (backdrop-filter: url(#liquid-glass-refraction)) {
            .liquid-glass {
                -webkit-backdrop-filter: url(#liquid-glass-refraction) blur(8px) saturate(1.2);
                backdrop-filter: url(#liquid-glass-refraction) blur(8px) saturate(1.2);
            }
        }

        .liquid-glass:hover {
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 
                inset 0 1.5px 2px rgba(255, 255, 255, 0.9),
                inset 0 -1.5px 2px rgba(255, 255, 255, 0.4),
                0 12px 40px rgba(0, 0, 0, 0.15);
        }

        /* ====== LIQUID GLASS - TEMA ÎNTUNECATĂ (Când e pe fundal negru) ====== */
        .liquid-glass.dark-mode {
            background: rgba(30, 30, 30, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 
                inset 0 1px 1px rgba(255, 255, 255, 0.15),
                inset 0 -1px 1px rgba(0, 0, 0, 0.4),
                0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .liquid-glass.dark-mode:hover {
            background: rgba(30, 30, 30, 0.6);
        }

        /* Forțăm iconițele gri să devină albe în modul dark */
        .liquid-glass.dark-mode .text-gray-500,
        .liquid-glass.dark-mode .text-gray-600 {
            color: rgba(255, 255, 255, 0.8) !important;
        }

        .liquid-glass.dark-mode .hover\:text-gray-800:hover,
        .liquid-glass.dark-mode .hover\:text-gray-900:hover {
            color: #ffffff !important;
        }
        /* ========================================================== */

        .category-pill {
            background: rgba(31, 41, 55, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="pb-28">
    <svg style="display: none;" aria-hidden="true">
      <filter id="liquid-glass-refraction" x="-20%" y="-20%" width="140%" height="140%">
        <feImage href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='256' height='256'><defs><radialGradient id='rg' cx='50%' cy='50%' r='50%'><stop offset='0%' stop-color='rgb(128,128,0)'/><stop offset='100%' stop-color='rgb(255,128,0)'/></radialGradient></defs><rect width='100%' height='100%' fill='url(%23rg)'/></svg>" result="displacement-map" />
        <feDisplacementMap in="SourceGraphic" in2="displacement-map" scale="15" xChannelSelector="R" yChannelSelector="G" result="refracted" />
      </filter>
    </svg>

    <div class="h-[44px] w-full"></div>
    
    <main>

            <div class="absolute inset-0 bg-gradient-to-r from-black/50 via-black/20 to-transparent flex flex-col justify-center px-6">

                <div class="category-pill text-white px-5 py-2.5 rounded-full text-sm font-medium whitespace-nowrap border border-white/10">Casă & Grădină</div>
                <div class="category-pill text-white px-5 py-2.5 rounded-full text-sm font-medium whitespace-nowrap border border-white/10">Gaming</div>
            </div>
        </section>

        <section class="mt-8 px-4">
            <h3 class="text-lg font-bold text-gray-800 mb-5">Cele mai bune oferte</h3>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white rounded-[20px] p-3 shadow-sm border border-gray-100 relative">
                    <div class="aspect-square bg-[#F3F4F6] rounded-[14px] mb-3 overflow-hidden">
                        <img alt="Smartwatch" class="w-full h-full object-cover mix-blend-multiply" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBw074jEY2phVtRsR6val6EzxYH7LFsDjfVzPx7GXS8pJ088p8JnZiBn3Y0rm4vUpRZyvsvz0VebACiFce1QIRs5zpC4Xj10TX5BLoduxgodlg0Jqx0Z9lmTGpdUEY2FjhR4cdSXxB3oNE2Ufde2xqZ5fcP_fUuQdbiq7pd06pJrqgpAWB57_AYN7pKG4_Rd4y6F3T-IoXP1-rm0P0QPiZ_g54iw9gA0f13HE4uOf0adOo6uGV2ifSpq1TML2T3V0TjG-hlsALLk8o5"/>
                    </div>
                    <div class="space-y-1">
                        <h4 class="text-[13px] font-semibold text-gray-800 line-clamp-2 leading-snug">Smartwatch Seria 8, GPS, Aluminiu</h4>
                        <div class="flex items-center space-x-1">
                            <span class="material-symbols-outlined text-yellow-400 text-[14px] fill-1">star</span>
                            <span class="text-[11px] text-gray-400">4.8 (120)</span>
                        </div>
                        <div class="pt-1 flex items-center justify-between">
                            <span class="text-[15px] font-bold text-[var(--green-custom)]">1.299 Lei</span>

                    </div>
                </div>
                </div>
            
            <div class="mt-20 p-10 bg-gray-900 rounded-[20px] h-64 flex items-center justify-center dark-section shadow-xl">
                <h3 class="text-white text-center font-bold">Zonă Întunecată.<br/>Scroll aici pentru a vedea cum se transformă meniul!</h3>
            </div>
            <div class="h-64"></div> </section>
    </main>

    <div id="nav-container" class="fixed bottom-8 left-0 right-0 z-50 px-5 flex items-center space-x-4">
        <nav class="flex-1 liquid-glass rounded-full h-[64px] flex justify-around items-center px-4">
            <a class="flex items-center justify-center text-[var(--green-custom)] w-12 h-12" href="#">
                <span class="material-symbols-outlined" style="font-size: 28px; font-variation-settings: 'FILL' 1;">home</span>
            </a>
            <a class="flex items-center justify-center text-gray-500 hover:text-gray-800 w-12 h-12 transition-colors" href="#">
                <span class="material-symbols-outlined" style="font-size: 28px;">shopping_cart</span>
            </a>
            <a class="flex items-center justify-center text-gray-500 hover:text-gray-800 w-12 h-12 transition-colors" href="#">
                <span class="material-symbols-outlined" style="font-size: 28px;">person</span>
            </a>
        </nav>
        
        <a class="liquid-glass w-[64px] h-[64px] rounded-full flex items-center justify-center text-gray-600 hover:text-gray-900 transition-colors shrink-0" href="#">
            <span class="material-symbols-outlined" style="font-size: 28px;">search</span>
        </a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const navContainer = document.getElementById('nav-container');
            const glassElements = document.querySelectorAll('.liquid-glass');
            
            const checkBackground = () => {
                // Căutăm pe pagină toate zonele marcate ca fiind întunecate
                const darkSections = document.querySelectorAll('.dark-section');
                const navRect = navContainer.getBoundingClientRect();
                
                // Calculăm linia centrală a meniului pe ecran
                const navCenterY = navRect.top + (navRect.height / 2);
                let isOverDark = false;
                
                darkSections.forEach(section => {
                    const rect = section.getBoundingClientRect();
                    // Verificăm dacă meniul s-a suprapus cu axa Y a secțiunii dark
                    if (navCenterY >= rect.top && navCenterY <= rect.bottom) {
                        isOverDark = true;
                    }
                });
                
                // Dacă da, îi adăugăm clasa dark, dacă nu, i-o scoatem
                if (isOverDark) {
                    glassElements.forEach(el => el.classList.add('dark-mode'));
                } else {
                    glassElements.forEach(el => el.classList.remove('dark-mode'));
                }
            };

            // Rulează o dată la scroll
            window.addEventListener('scroll', checkBackground, { passive: true });
            
            // Rulează o dată și la prima încărcare a paginii
            checkBackground();
        });
    </script>
</body>
</html>
